<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SDS Emblem Planner</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>SDS Emblem Planner</h1>
      <button id="langToggle">中文</button>
    </div>
    <p id="desc">Upload an image, select a crop region, and slice into 4 rows.</p>

    <div class="upload-area">
      <input type="file" id="imageInput" accept="image/*" />
      <label id="uploadLabel" for="imageInput">Choose an image</label>
    </div>

    <div id="cropSection" class="hidden">
      <div class="crop-wrap">
        <img id="cropImage" />
        <canvas id="cropCanvas"></canvas>
      </div>
      <button id="cropBtn">Crop &amp; Slice</button>
    </div>

    <div id="sliceControls" class="hidden">
      <label><span class="ctrl-label" data-key="leftPad">Left Pad</span>: <span id="leftPadVal">15</span>% <input type="range" id="leftPad" min="0" max="40" value="15" /></label>
      <label><span class="ctrl-label" data-key="rightPad">Right Pad</span>: <span id="rightPadVal">0</span>% <input type="range" id="rightPad" min="0" max="40" value="0" /></label>
      <label><span class="ctrl-label" data-key="fontSize">Font Size</span>: <span id="fontSizeVal">10</span>px <input type="range" id="fontSize" min="6" max="20" value="10" /></label>
    </div>
    <div id="slices" class="hidden"></div>
  </div>

  <script src="script.js"></script>
</body>
</html>
